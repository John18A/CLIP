<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED-TERMINAL | BASE HUNTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        .glow-text { text-shadow: 0 0 10px #00e5ff; }
        .terminal-border { border: 1px solid rgba(0, 229, 255, 0.2); }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-[#050505] rounded-2xl overflow-hidden terminal-border shadow-[0_0_60px_rgba(0,229,255,0.05)]">
        
        <div class="p-6 border-b border-zinc-900 flex justify-between items-start">
            <div>
                <p class="text-[10px] text-zinc-500 font-bold tracking-widest uppercase">Target Wallet Attached</p>
                <h1 class="text-xl font-bold text-white tracking-tighter uppercase">Alfred <span class="text-[#00e5ff]">Hunter v25.2</span></h1>
                <p id="wallet-display" class="text-[9px] text-[#00e5ff]/60 font-mono mt-1">ID: 0x5731...3D53</p>
            </div>
            <div class="text-right">
                <div class="bg-zinc-900 px-3 py-2 rounded border border-zinc-800">
                    <p class="text-[9px] text-zinc-500 uppercase font-bold">Saldo Real (ETH)</p>
                    <p id="real-balance" class="text-sm font-mono font-bold text-white">0.0000</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-black h-80 overflow-hidden relative">
            <div id="console" class="flex flex-col-reverse gap-1 text-[10px] font-mono leading-tight">
                <p class="text-[#00e5ff] animate-pulse">>>> CONECTANDO AO NÓ DA ALCHEMY EM BELO HORIZONTE...</p>
            </div>
        </div>

        <div class="p-6 bg-[#080808] border-t border-zinc-900">
            <button onclick="requestWithdraw()" id="btn-withdraw" class="w-full bg-[#00e5ff] hover:bg-[#00c2d9] text-black font-black py-4 rounded-xl transition-all uppercase tracking-widest text-xs shadow-[0_0_20px_rgba(0,229,255,0.2)]">
                PROCESSAR SAQUE (VIA BASE/ETH)
            </button>
            <p id="status-msg" class="text-[8px] text-center text-zinc-600 mt-4 uppercase tracking-[0.2em]">Secure Node Connection: Active</p>
        </div>
    </div>

    <script>
        const ALCHEMY_KEY = "VF0h4IB4GqBfk6WlqNcWh"; // Sua chave
        const MY_WALLET = "0x573192b75b93f7f4533cadfa4c8ee5f21bf93d53";
        const RPC_URL = `https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}`;
        
        const consoleEl = document.getElementById('console');
        const balanceEl = document.getElementById('real-balance');

        function addLog(text, type = 'normal') {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false});
            if (type === 'whale') p.className = 'text-[#00e5ff] font-bold';
            else if (type === 'system') p.className = 'text-green-500 font-bold';
            else p.className = 'text-zinc-600';
            
            p.innerHTML = `[${time}] ${text}`;
            consoleEl.prepend(p);
            if (consoleEl.children.length > 50) consoleEl.removeChild(consoleEl.lastChild);
        }

        async function updateBalance(provider) {
            const balance = await provider.getBalance(MY_WALLET);
            const ethValue = ethers.formatEther(balance);
            balanceEl.innerText = parseFloat(ethValue).toFixed(4);
        }

        async function init() {
            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                addLog("SISTEMA ALFRED ONLINE NA REDE ETH/BASE.", "system");
                addLog(`MONITORANDO CARTEIRA: ${MY_WALLET.substring(0,10)}...`, "system");

                updateBalance(provider);

                provider.on("block", (n) => {
                    addLog(`SCANNING BLOCK #${n}...`, "normal");
                    updateBalance(provider);
                    
                    // Simulação de detecção para interface não ficar parada
                    if(Math.random() > 0.9) addLog("DETECTADA MOVIMENTAÇÃO DE ALTO VOLUME NA REDE.", "whale");
                });

            } catch (e) {
                addLog("ERRO DE SINCRONIZAÇÃO. RECONECTANDO...", "system");
            }
        }

        function requestWithdraw() {
            const btn = document.getElementById('btn-withdraw');
            btn.innerText = "VERIFICANDO LIQUIDEZ...";
            btn.disabled = true;
            
            setTimeout(() => {
                alert("🎩 Alfred Informa: Para processar o saque real desta carteira para sua conta em BH, o Alfred precisa de uma 'Assinatura de Wallet' (MetaMask). Deseja configurar o Smart Contract agora?");
                btn.innerText = "PROCESSAR SAQUE (VIA BASE/ETH)";
                btn.disabled = false;
            }, 2000);
        }

        init();
    </script>
</body>
</html>
