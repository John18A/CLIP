<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED-TERMINAL CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        .glow-text { text-shadow: 0 0 8px #00e5ff; }
        .scan-line { border-left: 2px solid #00e5ff; padding-left: 10px; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #111; border-radius: 10px; }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-[#050505] border border-zinc-800 rounded-2xl shadow-[0_0_50px_rgba(0,229,255,0.1)] overflow-hidden">
        
        <div class="p-6 border-b border-zinc-900 flex justify-between items-end">
            <div>
                <h1 class="text-xs font-black tracking-[0.3em] text-zinc-500">SYSTEM: <span class="text-white">ALFRED-TERMINAL</span></h1>
                <p class="text-[22px] font-bold text-[#00e5ff] glow-text">CLOUD V25.0</p>
                <p id="counter" class="text-[10px] text-zinc-400 mt-1">SINCRO: 44.000 SCANS</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-zinc-600 mb-1 font-bold">BH_USER_PRO: JOHN</p>
                <div class="bg-zinc-900 px-3 py-1 rounded-md border border-zinc-800">
                    <p id="balance" class="text-lg font-mono font-bold text-white">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-black h-72 overflow-hidden relative">
            <div id="console" class="flex flex-col-reverse gap-1 text-[10px] font-mono leading-tight">
                <p class="text-[#00e5ff] animate-pulse">>>> ALFRED-CLOUD ONLINE. AGUARDANDO BALEIAS...</p>
            </div>
            <div class="absolute inset-0 pointer-events-none bg-gradient-to-b from-transparent via-transparent to-[#00e5ff]/5"></div>
        </div>

        <div class="p-6 bg-[#080808] border-t border-zinc-900 grid grid-cols-2 gap-4">
            <button onclick="alert('🎩 Alfred: Chave PIX detectada em BH. Processando saque...')" class="bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-white text-[10px] font-bold py-4 rounded-xl transition-all">
                SACAR (PIX)
            </button>
            <button onclick="alert('🔄 Alfred: Conversão global para BRL ativa.')" class="bg-transparent hover:bg-[#00e5ff]/10 border border-[#00e5ff] text-[#00e5ff] text-[10px] font-bold py-4 rounded-xl transition-all">
                SWAP GLOBAL
            </button>
        </div>
        
        <div class="pb-4 text-center">
            <span class="text-[8px] text-zinc-700 tracking-widest uppercase">Encryption: TRC20/ERC20 Enabled</span>
        </div>
    </div>

    <script>
        // MOTOR DO ALFRED
        let totalScans = 44000;
        let walletBrl = 0.00;
        const consoleEl = document.getElementById('console');
        const counterEl = document.getElementById('counter');
        const balanceEl = document.getElementById('balance');

        function addLog(text, type = 'normal') {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false});
            
            if (type === 'whale') {
                p.className = 'text-[#00e5ff] font-bold glow-text';
                p.innerHTML = `[${time}] 🐋 WHALE FOUND: ${text}`;
            } else if (type === 'hot') {
                p.className = 'text-yellow-500 font-bold';
                p.innerHTML = `[${time}] 🔥 HOT DUST: ${text}`;
            } else {
                p.className = 'text-zinc-600';
                p.innerHTML = `[${time}] 🔎 SCAN: ${text}`;
            }
            
            consoleEl.prepend(p);
            
            // Limpa logs antigos para não travar o navegador
            if (consoleEl.children.length > 50) {
                consoleEl.removeChild(consoleEl.lastChild);
            }
        }

        // Loop de processamento (Simula o motor de 150 blocos)
        setInterval(() => {
            totalScans += 150;
            counterEl.innerText = `SINCRO: ${totalScans.toLocaleString()} SCANS`;

            const chance = Math.random();
            const hash = '0x' + Math.random().toString(16).substring(2, 12).toUpperCase();

            if (chance > 0.96) {
                if (chance > 0.992) {
                    addLog(hash, 'whale');
                    // Ganho simulado por baleia encontrada
                    walletBrl += (Math.random() * 15) + 5;
                    balanceEl.innerText = `R$ ${walletBrl.toFixed(2)}`;
                } else if (chance > 0.975) {
                    addLog(hash, 'hot');
                } else {
                    addLog(hash, 'normal');
                }
            }
        }, 160);
    </script>
</body>
</html>
