<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED-TERMINAL REAL TIME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        .glow-text { text-shadow: 0 0 8px #00e5ff; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #111; border-radius: 10px; }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-lg bg-[#050505] border border-zinc-800 rounded-2xl shadow-[0_0_50px_rgba(0,229,255,0.1)] overflow-hidden">
        
        <div class="p-6 border-b border-zinc-900 flex justify-between items-end">
            <div>
                <h1 class="text-xs font-black tracking-[0.3em] text-zinc-500 text-white">ALFRED-TERMINAL</h1>
                <p class="text-[22px] font-bold text-[#00e5ff] glow-text">HUNTER MODE</p>
                <p id="block-info" class="text-[10px] text-zinc-400 mt-1 uppercase tracking-tighter">CONECTANDO ALCHEMY...</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-zinc-600 mb-1 font-bold">BH_NODE: JOHN_ÁTILA</p>
                <div class="bg-zinc-900 px-3 py-1 rounded-md border border-zinc-800">
                    <p id="gas-info" class="text-xs font-mono font-bold text-white">GAS: --</p>
                </div>
            </div>
        </div>

        <div class="p-4 bg-black h-72 overflow-hidden relative">
            <div id="console" class="flex flex-col-reverse gap-1 text-[10px] font-mono leading-tight">
                <p class="text-[#00e5ff] animate-pulse">>>> INICIALIZANDO SENSORES BLOCKCHAIN...</p>
            </div>
        </div>

        <div class="p-6 bg-[#080808] border-t border-zinc-900 grid grid-cols-2 gap-4">
            <div class="text-[9px] text-zinc-500 uppercase tracking-widest">Status: <span id="status-dot" class="text-red-500">OFFLINE</span></div>
            <div class="text-[9px] text-zinc-500 text-right uppercase tracking-widest">Network: Ethereum Mainnet</div>
        </div>
    </div>

    <script>
        const ALCHEMY_KEY = "VF0h4IB4GqBfk6WlqNcWh";
        const RPC_URL = `https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}`;
        
        const consoleEl = document.getElementById('console');
        const blockEl = document.getElementById('block-info');
        const statusDot = document.getElementById('status-dot');
        const gasEl = document.getElementById('gas-info');

        function addLog(text, type = 'normal') {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false});
            
            if (type === 'whale') {
                p.className = 'text-[#00e5ff] font-bold glow-text';
                p.innerHTML = `[${time}] 🐋 WHALE DETECTED: ${text}`;
            } else if (type === 'system') {
                p.className = 'text-green-500';
                p.innerHTML = `[${time}] ⚡ SYSTEM: ${text}`;
            } else {
                p.className = 'text-zinc-600';
                p.innerHTML = `[${time}] 🔎 SCAN: ${text}`;
            }
            
            consoleEl.prepend(p);
            if (consoleEl.children.length > 50) consoleEl.removeChild(consoleEl.lastChild);
        }

        async function initAlfred() {
            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                
                statusDot.innerText = "ONLINE";
                statusDot.className = "text-green-500";
                addLog("CONEXÃO ESTABELECIDA COM SUCESSO.", "system");

                // Monitora novos blocos
                provider.on("block", async (blockNumber) => {
                    blockEl.innerText = `BLOCK: #${blockNumber}`;
                    addLog(`NOVO BLOCO DETECTADO: #${blockNumber}`, "system");
                    
                    // Atualiza Gas
                    const feeData = await provider.getFeeData();
                    const gasGwei = ethers.formatUnits(feeData.gasPrice, "gwei");
                    gasEl.innerText = `GAS: ${Math.round(gasGwei)} GWEI`;
                });

                // Monitora Transações Pendentes (Mempool)
                provider.on("pending", async (txHash) => {
                    if (Math.random() > 0.98) { // Filtro para não travar a tela
                        addLog(`${txHash.substring(0, 15)}...`, "normal");
                    }
                    
                    // Lógica para detectar transação grande (Simulada para visualização rápida)
                    // Na versão final, checaríamos o 'value' da tx.
                });

            } catch (error) {
                addLog("ERRO DE CONEXÃO. VERIFIQUE A CHAVE ALCHEMY.", "system");
                console.error(error);
            }
        }

        initAlfred();
    </script>
</body>
</html>
