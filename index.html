<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED MULTI-VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; }
        .glow-cyan { text-shadow: 0 0 10px #00e5ff; color: #00e5ff; }
        .vault-card { border: 1px solid #111; transition: all 0.3s; cursor: pointer; }
        .vault-card:hover { border-color: #00e5ff; background: #080808; }
        .selected { border-color: #00e5ff; background: #0a0a0a; box-shadow: 0 0 15px rgba(0,229,255,0.1); }
    </style>
</head>
<body class="bg-black min-h-screen flex items-center justify-center p-4 text-[10px]">

    <div class="w-full max-w-md bg-[#050505] rounded-3xl border border-zinc-900 overflow-hidden shadow-2xl">
        
        <div class="p-6 border-b border-zinc-900">
            <h1 class="text-zinc-500 font-black tracking-widest uppercase">Alfred Terminal v26.0</h1>
            <p id="block-display" class="text-2xl font-bold glow-cyan uppercase">SINCRO...</p>
            <p class="text-zinc-600 mt-1 uppercase font-bold">BH_NODE: JOHN_ÁTILA // NC_WALLET_SYNC</p>
        </div>

        <div class="p-4 space-y-2">
            <p class="text-zinc-500 mb-3 ml-1 font-bold uppercase tracking-widest">Rotas NC Wallet:</p>
            
            <div onclick="selectVault('BTC', '1KfoKR7X38EMYgdVQ3NiAU5nn2YR5ZqdVW')" id="vault-BTC" class="vault-card p-3 rounded-xl flex justify-between items-center">
                <div><p class="text-white font-bold tracking-tighter text-xs">BITCOIN (BTC)</p><p class="text-zinc-500 text-[8px]">Rede Nativa</p></div>
                <span class="text-orange-500 font-bold uppercase text-[8px]">1Kfo...dVW</span>
            </div>

            <div onclick="selectVault('USDT', 'TWcQUaskpVarJnmMnR1mL3XWhHXh9FLR1G')" id="vault-USDT" class="vault-card p-3 rounded-xl flex justify-between items-center">
                <div><p class="text-white font-bold tracking-tighter text-xs text-green-500">TETHER (USDT)</p><p class="text-zinc-500 text-[8px]">Rede TRC20</p></div>
                <span class="text-green-500 font-bold uppercase text-[8px]">TWcQ...R1G</span>
            </div>

            <div onclick="selectVault('SHIBA', '0xb716fb85e51b8742ce2ac1c073681497d522277b')" id="vault-SHIBA" class="vault-card p-3 rounded-xl flex justify-between items-center">
                <div><p class="text-white font-bold tracking-tighter text-xs text-blue-500">SHIBA INU (SHIB)</p><p class="text-zinc-500 text-[8px]">Rede ERC20</p></div>
                <span class="text-blue-500 font-bold uppercase text-[8px]">0xb71...77b</span>
            </div>
        </div>

        <div class="mx-4 p-3 bg-black border border-zinc-900 rounded-lg h-32 overflow-hidden relative">
            <div id="console" class="flex flex-col-reverse gap-1 leading-none text-zinc-500 text-[9px]">
                <p>>>> AGUARDANDO COMANDO DO OPERADOR...</p>
            </div>
        </div>

        <div class="p-6">
            <button onclick="processWithdraw()" class="w-full bg-white text-black font-black py-4 rounded-2xl hover:bg-[#00e5ff] transition-all uppercase tracking-[0.2em]">
                Executar Saque Inteligente
            </button>
        </div>
    </div>

    <script>
        const ALCHEMY_KEY = "VF0h4IB4GqBfk6WlqNcWh"; // Sua chave
        const RPC_URL = `https://eth-mainnet.g.alchemy.com/v2/${ALCHEMY_KEY}`;
        let selectedAsset = "";
        let selectedWallet = "";

        function addLog(msg, color = 'zinc-500') {
            const p = document.createElement('p');
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false});
            p.innerHTML = `[${time}] <span class="text-${color}">${msg}</span>`;
            document.getElementById('console').prepend(p);
        }

        async function init() {
            try {
                const provider = new ethers.JsonRpcProvider(RPC_URL);
                provider.on("block", (n) => {
                    document.getElementById('block-display').innerText = `BLOCK: #${n}`;
                    addLog(`SCANNING NETWORK... BLOCK #${n}`, 'zinc-500');
                });
                addLog("ALFRED ONLINE. SINCRONIZADO COM BELO HORIZONTE.", "cyan-400");
            } catch (e) { addLog("ERRO DE CONEXÃO. VERIFIQUE A CHAVE ALCHEMY.", "red-500"); }
        }

        function selectVault(asset, wallet) {
            selectedAsset = asset;
            selectedWallet = wallet;
            document.querySelectorAll('.vault-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`vault-${asset}`).classList.add('selected');
            addLog(`ROTA ATIVADA: ENVIAR ${asset} PARA NC WALLET.`, 'cyan-400');
        }

        function processWithdraw() {
            if (!selectedAsset) { alert("🎩 Alfred: Selecione uma rota (BTC, USDT ou SHIB) primeiro."); return; }
            addLog(`SOLICITANDO SAQUE DE ${selectedAsset}...`, 'white font-bold');
            setTimeout(() => {
                alert(`🎩 Alfred: Processamento Concluído!\n\nAtivo: ${selectedAsset}\nDestino (NC WALLET): ${selectedWallet}\n\nStatus: Saque enviado para processamento na rede.`);
            }, 1200);
        }
        init();
    </script>
</body>
</html>
