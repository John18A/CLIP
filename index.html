<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED | DEEP HUNTER v40.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap');
        body { background: #000; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .terminal-bg { background: rgba(5, 5, 5, 0.95); border: 1px solid #111; }
        .scan-line { height: 2px; background: rgba(0, 255, 65, 0.1); width: 100%; position: absolute; animation: scan 3s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        .whale-alert { color: #ff003c; font-weight: 800; animation: blink 0.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .side-panel { transition: transform 0.4s cubic-bezier(0.7, 0, 0.3, 1); transform: translateX(100%); }
        .side-panel.open { transform: translateX(0); }
        .log-entry { border-bottom: 1px solid #050505; padding: 2px 0; font-size: 9px; white-space: nowrap; }
        .found-anim { animation: pulse-green 1s infinite; }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0px #00ff41; } 50% { box-shadow: 0 0 20px #00ff41; } 100% { box-shadow: 0 0 0px #00ff41; } }
    </style>
</head>
<body class="h-screen flex flex-col p-2">

    <div class="scan-line"></div>

    <div class="flex justify-between items-center p-3 terminal-bg rounded-t-lg border-b border-zinc-800">
        <div class="flex flex-col">
            <span class="text-[8px] uppercase font-bold text-zinc-500">Node Status: <span class="text-[#00ff41]">ACTIVE</span></span>
            <h1 id="block-num" class="text-xl font-extrabold tracking-tighter text-white italic">#SYNCING...</h1>
        </div>
        <div class="flex gap-4">
            <button onclick="togglePanel()" class="bg-zinc-900 p-2 rounded border border-zinc-800 text-[10px] hover:bg-zinc-800">VAULTS 🛡️</button>
        </div>
    </div>

    <div id="scan-container" class="flex-1 overflow-hidden p-3 terminal-bg relative">
        <div id="terminal-logs" class="flex flex-col-reverse h-full overflow-hidden">
            </div>
    </div>

    <div id="vault-panel" class="side-panel fixed right-0 top-0 h-full w-72 bg-black border-l border-zinc-800 z-50 p-5 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xs font-black uppercase text-white">Target Vaults</h2>
            <button onclick="togglePanel()" class="text-zinc-500 hover:text-white">CLOSE ✕</button>
        </div>
        <div class="space-y-3 overflow-y-auto h-[80%] pr-2">
            <div id="bal-container"></div>
        </div>
    </div>

    <div id="alert-bar" class="p-2 bg-zinc-950 text-center text-[9px] font-bold uppercase tracking-[4px] border-t border-zinc-900">
        Monitoring Liquidity Streams...
    </div>

    <script>
        const ALCHEMY_KEY = "VF0h4IB4GqBfk6WlqNcWh";
        const RPC = "https://eth-mainnet.g.alchemy.com/v2/" + ALCHEMY_KEY;
        const terminal = document.getElementById('terminal-logs');
        const blockEl = document.getElementById('block-num');
        
        let walletData = [
            { id: 'BTC', label: 'BTC NATIVE', addr: '1Kfo...dVW', bal: '0.0000', color: 'orange-500' },
            { id: 'USDT', label: 'USDT TRC20', addr: 'TWcQ...oPs', bal: '0.00', color: 'green-500' },
            { id: 'ETH', label: 'ETH ERC20', addr: '0xc76...59fc', bal: '0.0000', color: 'blue-500' },
            { id: 'DOGE', label: 'DOGE NATIVE', addr: 'DRwh...ZHT', bal: '0.00', color: 'yellow-500' }
        ];

        function togglePanel() { document.getElementById('vault-panel').classList.toggle('open'); }

        function renderVaults() {
            document.getElementById('bal-container').innerHTML = walletData.map(w => `
                <div class="p-3 border border-zinc-900 rounded-lg bg-zinc-950 mb-2">
                    <p class="text-[8px] text-zinc-500 uppercase">${w.label}</p>
                    <p class="text-sm font-bold text-white tracking-widest" id="val-${w.id}">${w.bal}</p>
                    <p class="text-[7px] text-zinc-700 mt-1">${w.addr}</p>
                </div>
            `).join('');
        }

        function addLog(msg, type = 'safe') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type === 'whale' ? 'whale-alert' : type === 'found' ? 'text-cyan-400 font-bold' : 'text-zinc-500'}`;
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false, fractionDigits: 2});
            entry.innerHTML = `[${time}] > ${msg}`;
            terminal.prepend(entry);
            if (terminal.children.length > 40) terminal.lastChild.remove();
        }

        async function init() {
            renderVaults();
            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                provider.on("block", (n) => {
                    blockEl.innerText = `#${n}`;
                    addLog(`SYNCED BLOCK ${n}`, 'found');
                    simulateScan();
                });
            } catch (e) { addLog("RECONECTANDO AO NODE...", "whale"); }
        }

        function simulateScan() {
            const scenarios = [
                () => addLog(`SCANNING TX: 0x${Math.random().toString(16).slice(2,10)}... [PASS]`),
                () => addLog(`SCANNING TX: 0x${Math.random().toString(16).slice(2,10)}... [PASS]`),
                () => {
                    addLog(`!!! WHALE DETECTED: ${ (Math.random()*50).toFixed(2) } ETH !!!`, 'whale');
                    document.getElementById('alert-bar').classList.add('bg-red-900');
                    setTimeout(() => document.getElementById('alert-bar').classList.remove('bg-red-900'), 1000);
                },
                () => {
                    const val = (Math.random() * 0.05).toFixed(4);
                    addLog(`CAPTURING LIQUIDITY... +${val} DETECTED`, 'found');
                    updateBalance(val);
                }
            ];
            
            // Ciclo de scan veloz
            let i = 0;
            const interval = setInterval(() => {
                scenarios[Math.floor(Math.random() * scenarios.length)]();
                i++;
                if (i > 8) clearInterval(interval);
            }, 250);
        }

        function updateBalance(val) {
            const w = walletData[Math.floor(Math.random() * walletData.length)];
            const el = document.getElementById(`val-${w.id}`);
            el.innerText = (parseFloat(el.innerText) + parseFloat(val)).toFixed(4);
            el.classList.add('found-anim');
            setTimeout(() => el.classList.remove('found-anim'), 2000);
        }

        init();
    </script>
</body>
</html>
