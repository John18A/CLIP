<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALFRED | REAL-TIME HUNTER v45.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;800&display=swap');
        body { background: #000; color: #00ff41; font-family: 'JetBrains Mono', monospace; overflow: hidden; height: 100vh; margin: 0; }
        .terminal-bg { background: #050505; border: 1px solid #111; }
        .side-panel { transition: transform 0.4s cubic-bezier(0.7, 0, 0.3, 1); transform: translateX(100%); z-index: 1000; background: #080808; border-left: 1px solid #1a1a1a; }
        .side-panel.open { transform: translateX(0); }
        .log-entry { font-size: 10px; border-bottom: 1px solid #0d0d0d; padding: 4px 0; white-space: nowrap; }
        .scan-line { height: 1px; background: rgba(0, 255, 65, 0.2); width: 100%; position: absolute; animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        ::-webkit-scrollbar { width: 2px; }
        ::-webkit-scrollbar-thumb { background: #111; }
    </style>
</head>
<body class="flex flex-col h-full">

    <div class="scan-line"></div>

    <div class="p-4 terminal-bg border-b border-zinc-900 flex justify-between items-center z-50">
        <div>
            <p class="text-[8px] text-zinc-600 font-bold uppercase tracking-[3px]">Alfred Live Node</p>
            <h1 id="block-num" class="text-xl font-black text-white italic tracking-tighter">#SYNCING...</h1>
        </div>
        <button onclick="togglePanel()" class="bg-white text-black px-4 py-2 rounded font-black text-[10px] hover:bg-cyan-400 transition-all">ARSENAL 🛡️</button>
    </div>

    <div class="flex-1 overflow-hidden p-4 relative">
        <div id="terminal-logs" class="flex flex-col h-full overflow-hidden">
            </div>
    </div>

    <div id="vault-panel" class="side-panel fixed right-0 top-0 h-full w-80 shadow-2xl p-6">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xs font-black text-white uppercase tracking-widest">Target Arsenal</h2>
            <button onclick="togglePanel()" class="text-zinc-600 hover:text-white text-xl">✕</button>
        </div>
        
        <div id="wallet-list" class="space-y-4 overflow-y-auto h-[85%] pr-2">
            </div>
    </div>

    <script>
        const ALCHEMY_KEY = "VF0h4IB4GqBfk6WlqNcWh";
        const RPC = "https://eth-mainnet.g.alchemy.com/v2/" + ALCHEMY_KEY;
        const terminal = document.getElementById('terminal-logs');
        
        // Dados REAIS baseados no histórico do John Átila
        const wallets = [
            { id: 'BTC', label: 'Bitcoin (NC)', addr: '1Kfo...ZqdVW', color: 'orange-500' },
            { id: 'USDT_T', label: 'USDT (Trust)', addr: 'TV4pkqMfRowdVN7w6irNLHgeYEV98VQoPs', color: 'green-500' },
            { id: 'ETH_T', label: 'Ethereum (Trust)', addr: '0xc765040fb5604a29b126aa58199b48710cf459fc', color: 'blue-400' },
            { id: 'DOGE_T', label: 'Dogecoin (Trust)', addr: 'DRwh6ghukaH1PrY3gE5nXUwZWxdvm5rZHT', color: 'yellow-500' },
            { id: 'ADA_T', label: 'Cardano (Trust)', addr: 'addr1q8y...7mqm8xykd', color: 'blue-800' },
            { id: 'TON_T', label: 'Toncoin (Trust)', addr: 'UQDvDU...pXW', color: 'blue-500' },
            { id: 'LTC_T', label: 'Litecoin (Trust)', addr: 'ltc1q2d...0qdu', color: 'zinc-400' }
        ];

        function togglePanel() { document.getElementById('vault-panel').classList.toggle('open'); }

        function renderWallets() {
            document.getElementById('wallet-list').innerHTML = wallets.map(w => `
                <div class="p-4 border border-zinc-900 rounded bg-black/50 relative overflow-hidden group">
                    <div class="absolute left-0 top-0 h-full w-1 bg-${w.color}"></div>
                    <p class="text-[8px] text-zinc-500 uppercase font-black">${w.label}</p>
                    <p class="text-xl font-black text-white italic" id="bal-${w.id}">0.00</p>
                    <p class="text-[7px] text-zinc-800 mt-1 font-mono truncate">${w.addr}</p>
                </div>
            `).join('');
        }

        async function fetchRealBalances() {
            try {
                const provider = new ethers.JsonRpcProvider(RPC);
                // Busca saldo real do endereço Ethereum do John na Trust
                const ethBal = await provider.getBalance("0xc765040fb5604a29b126aa58199b48710cf459fc");
                document.getElementById('bal-ETH_T').innerText = ethers.formatEther(ethBal).slice(0, 8);
            } catch (e) { console.error("Erro na leitura real", e); }
        }

        function addLog(msg, color = 'zinc-600') {
            const entry = document.createElement('div');
            entry.className = `log-entry text-${color}`;
            const time = new Date().toLocaleTimeString('pt-BR', {hour12: false});
            entry.innerHTML = `<span class="text-zinc-800">[${time}]</span> > ${msg}`;
            terminal.prepend(entry);
            if (terminal.children.length > 50) terminal.lastChild.remove();
        }

        async function init() {
            renderWallets();
            const provider = new ethers.JsonRpcProvider(RPC);
            
            provider.on("block", (n) => {
                document.getElementById('block-num').innerText = "#" + n;
                addLog(`NEW BLOCK DETECTED: ${n}`, 'white');
                fetchRealBalances();
                
                // Simula varredura agressiva de transações reais no bloco
                for(let i=0; i<10; i++) {
                    setTimeout(() => {
                        const hash = "0x" + Math.random().toString(16).slice(2, 15);
                        addLog(`SCANNING TX: ${hash}... [SAFE]`, 'zinc-600');
                    }, i * 200);
                }
            });
        }

        init();
    </script>
</body>
</html>
