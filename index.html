<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Crypto Hunter Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <style>
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Arial;
      padding: 20px;
    }
    h1 {
      color: #22c55e;
    }
    .card {
      background: #1e293b;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>🚀 Crypto Opportunity Scanner</h1>
<div id="results">Carregando...</div>

<script>
const container = document.getElementById("results");

// Simulação de fontes reais (você pode trocar por APIs reais depois)
const sources = [
  {
    name: "Airdrops",
    url: "https://api.coingecko.com/api/v3/search/trending"
  },
  {
    name: "Faucets confiáveis",
    url: "https://api.coinpaprika.com/v1/tickers"
  }
];

async function scan() {
  container.innerHTML = "🔎 Buscando oportunidades...";

  let html = "";

  for (const source of sources) {
    try {
      const res = await axios.get(source.url);

      html += `<div class="card"><h2>${source.name}</h2>`;

      const items = res.data.coins || res.data.slice(0, 5);

      items.forEach(item => {
        const name = item.item?.name || item.name;
        html += `<p>✅ ${name}</p>`;
      });

      html += `</div>`;
    } catch (e) {
      html += `<div class="card">Erro ao buscar ${source.name}</div>`;
    }
  }

  container.innerHTML = html;
}

// Atualiza a cada 30 segundos
setInterval(scan, 30000);
scan();
</script>

</body>
</html>
